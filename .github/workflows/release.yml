name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          versioned="amux-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
          stable="amux-${GOOS}-${GOARCH}"

          mkdir -p "$versioned" "$stable"
          ./scripts/build-amux.sh "$versioned/amux"
          cp README.md "$versioned/README.md"
          cp "$versioned/amux" "$stable/amux"
          cp README.md "$stable/README.md"

          tar -czf "$versioned.tar.gz" "$versioned"
          sha256sum "$versioned.tar.gz" > "$versioned.tar.gz.sha256"
          tar -czf "$stable.tar.gz" "$stable"
          sha256sum "$stable.tar.gz" > "$stable.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: amux-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            amux-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            amux-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256
            amux-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            amux-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: zainfathoni/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: homebrew-tap

      - name: Update Homebrew formula
        run: |
          formula=homebrew-tap/Formula/amux.rb
          scripts/update-homebrew-formula.sh "${GITHUB_REF_NAME}" dist "$formula"
          ruby -c "$formula"

          if git -C homebrew-tap diff --quiet -- Formula/amux.rb; then
            echo "Homebrew formula is already current for ${GITHUB_REF_NAME}"
            exit 0
          fi

          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C homebrew-tap add Formula/amux.rb
          git -C homebrew-tap commit -m "Update amux to ${GITHUB_REF_NAME}"
          git -C homebrew-tap push origin HEAD:main
