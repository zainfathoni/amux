name: DCG Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dcg
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download --repo Dicklesworthstone/destructive_command_guard --pattern install.sh --output /tmp/install-dcg.sh
          bash /tmp/install-dcg.sh --easy-mode
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Scan repository
        run: dcg scan --paths . --fail-on error
