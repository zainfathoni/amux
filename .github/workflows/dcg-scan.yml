name: DCG Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dcg
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/Dicklesworthstone/destructive_command_guard/3423576da804a2578990d9a62791fc9fe46c5f3b/install.sh --output /tmp/install-dcg.sh
          bash /tmp/install-dcg.sh --no-configure
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Scan repository
        run: dcg scan --paths . --fail-on error
