<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">amux — local tmux workspaces for Amp</title>
  <desc id="desc">A navy and red social preview card for amux, showing lifecycle verbs and a terminal panel.</desc>
  <defs>
    <linearGradient id="wash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2638" />
      <stop offset="0.5" stop-color="#161e2e" />
      <stop offset="1" stop-color="#10141f" />
    </linearGradient>
    <radialGradient id="red-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(158 116) rotate(40) scale(540 430)">
      <stop offset="0" stop-color="#f05252" stop-opacity="0.36" />
      <stop offset="0.55" stop-color="#f05252" stop-opacity="0.1" />
      <stop offset="1" stop-color="#f05252" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="white-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1010 80) rotate(128) scale(460 360)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16" />
      <stop offset="0.65" stop-color="#ffffff" stop-opacity="0.04" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <pattern id="mesh" width="58" height="58" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <path d="M0 0H58" stroke="#ffffff" stroke-opacity="0.16" stroke-width="1" />
    </pattern>
    <filter id="shadow" x="70" y="44" width="1060" height="548" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000000" flood-opacity="0.42" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#161e2e" />
  <rect width="1200" height="630" fill="url(#wash)" />
  <rect width="1200" height="630" fill="url(#red-glow)" />
  <rect width="1200" height="630" fill="url(#white-glow)" />
  <rect width="1200" height="630" fill="url(#mesh)" opacity="0.34" />
  <rect width="1200" height="630" fill="url(#wash)" opacity="0.72" />

  <g filter="url(#shadow)">
    <rect x="86" y="78" width="1028" height="474" fill="#141b29" stroke="#ffffff" stroke-opacity="0.12" />
    <rect x="112" y="104" width="976" height="422" fill="#161e2e" stroke="#ffffff" stroke-opacity="0.08" />
  </g>

  <g transform="translate(154 142)">
    <circle cx="34" cy="34" r="34" fill="#ffffff" />
    <text x="34" y="43" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800" letter-spacing="-2" fill="#161e2e">am</text>
    <text x="88" y="43" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="800" letter-spacing="-1.4" fill="#ffffff">amux</text>
    <path d="M182 14V54" stroke="#ffffff" stroke-opacity="0.18" />
    <text x="204" y="41" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="500" fill="#ffffff" opacity="0.62">local tmux workspaces for Amp</text>
  </g>

  <g transform="translate(154 270)">
    <text font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="68" font-weight="800" letter-spacing="-4" fill="#ffffff">Pin. Launch.</text>
    <text y="72" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="68" font-weight="800" letter-spacing="-4" fill="#ffffff">Park. </text>
    <text x="180" y="72" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="68" font-weight="800" letter-spacing="-4" fill="#f05252">Teardown.</text>
    <text y="136" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="500" fill="#ffffff" opacity="0.72">One TSV restores local Amp workspaces.</text>
  </g>

  <g transform="translate(750 164)">
    <rect width="310" height="296" fill="#10141f" stroke="#ffffff" stroke-opacity="0.14" />
    <rect width="310" height="48" fill="#141b29" />
    <circle cx="28" cy="24" r="5" fill="#ffffff" opacity="0.16" />
    <circle cx="48" cy="24" r="5" fill="#ffffff" opacity="0.16" />
    <circle cx="68" cy="24" r="5" fill="#f05252" />
    <text x="210" y="30" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="14" fill="#ffffff" opacity="0.58">tmux · Amp</text>
    <text x="24" y="92" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="18" fill="#f05252">$</text>
    <text x="48" y="92" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="18" fill="#d6dbe6">amux pin-current T-123</text>
    <text x="48" y="128" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="17" fill="#ffffff" opacity="0.66">saved row: mac web-redesign</text>
    <text x="24" y="184" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="18" fill="#f05252">$</text>
    <text x="48" y="184" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="18" fill="#d6dbe6">amux launch --dry-run</text>
    <text x="48" y="220" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="17" fill="#ffffff" opacity="0.66">would restore window</text>
    <rect x="48" y="252" width="84" height="8" fill="#f05252" />
  </g>

  <g transform="translate(154 494)">
    <rect width="34" height="5" fill="#f05252" />
    <text x="54" y="8" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="23" fill="#ffffff" opacity="0.58">amux.zainf.dev</text>
  </g>
</svg>
