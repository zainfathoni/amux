<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">amux — Amp session manager for tmux</title>
  <desc id="desc">A dark social preview card for amux with terminal-inspired panels and green accents.</desc>
  <defs>
    <radialGradient id="glow-left" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(140 90) rotate(48) scale(620 520)">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.34" />
      <stop offset="0.55" stop-color="#34d399" stop-opacity="0.08" />
      <stop offset="1" stop-color="#34d399" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-right" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 70) rotate(135) scale(520 430)">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.28" />
      <stop offset="0.6" stop-color="#60a5fa" stop-opacity="0.07" />
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="card" x1="148" y1="94" x2="1052" y2="536" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18181b" />
      <stop offset="1" stop-color="#0f1014" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ee7b7" />
      <stop offset="1" stop-color="#10b981" />
    </linearGradient>
    <filter id="shadow" x="80" y="40" width="1040" height="560" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="38" flood-color="#000000" flood-opacity="0.44" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#09090b" />
  <rect width="1200" height="630" fill="url(#glow-left)" />
  <rect width="1200" height="630" fill="url(#glow-right)" />

  <g opacity="0.5">
    <path d="M0 502H1200" stroke="#ffffff" stroke-opacity="0.045" />
    <path d="M0 126H1200" stroke="#ffffff" stroke-opacity="0.035" />
    <path d="M236 0V630" stroke="#ffffff" stroke-opacity="0.035" />
    <path d="M964 0V630" stroke="#ffffff" stroke-opacity="0.035" />
  </g>

  <g filter="url(#shadow)">
    <rect x="108" y="82" width="984" height="466" rx="42" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12" />
    <rect x="132" y="106" width="936" height="418" rx="28" fill="#09090b" fill-opacity="0.34" stroke="#ffffff" stroke-opacity="0.06" />
  </g>

  <g transform="translate(164 148)">
    <rect width="82" height="82" rx="24" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.13" />
    <text x="41" y="53" text-anchor="middle" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="31" font-weight="700" fill="#6ee7b7">am</text>
  </g>

  <g transform="translate(164 272)">
    <text font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="88" font-weight="700" letter-spacing="-6" fill="#fafafa">amux</text>
    <text y="74" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="600" letter-spacing="-0.8" fill="#d4d4d8">Amp session manager for tmux</text>
    <text y="132" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="500" fill="#a1a1aa">pin • park • restore • spawn • teardown</text>
  </g>

  <g transform="translate(780 160)">
    <rect width="280" height="286" rx="24" fill="#111113" stroke="#ffffff" stroke-opacity="0.12" />
    <rect x="0" y="0" width="280" height="48" rx="24" fill="#18181b" />
    <circle cx="30" cy="24" r="6" fill="#ef4444" />
    <circle cx="52" cy="24" r="6" fill="#f59e0b" />
    <circle cx="74" cy="24" r="6" fill="#10b981" />
    <text x="22" y="91" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18" fill="#6ee7b7">$ amux launch</text>
    <text x="22" y="128" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18" fill="#d4d4d8">restored mac/Amp</text>
    <text x="22" y="182" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18" fill="#6ee7b7">$ amux doctor</text>
    <text x="22" y="219" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18" fill="#d4d4d8">OK config rows: 3</text>
    <rect x="22" y="246" width="128" height="8" rx="4" fill="url(#accent)" />
  </g>

  <text x="164" y="492" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="24" fill="#71717a">amux.zainf.dev</text>
</svg>
